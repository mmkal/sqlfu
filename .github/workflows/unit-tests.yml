name: unit-tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  sqlfu:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run sqlfu migration and schemadiff unit tests
        run: pnpm --dir packages/sqlfu exec vitest test/migrations test/schemadiff --run

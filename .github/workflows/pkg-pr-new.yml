name: pkg.pr.new

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter sqlfu build

      - name: Publish preview package
        # --pnpm so pkg-pr-new packs with `pnpm pack` instead of `npm pack`.
        # npm pack does not substitute `publishConfig.exports` into `exports`;
        # pnpm pack does. Without this, consumers of the preview tarball see
        # `exports` pointing at the source `./src/*.ts` paths (which aren't
        # in `files`) and get ERR_MODULE_NOT_FOUND.
        run: pnpm dlx pkg-pr-new publish --pnpm ./packages/sqlfu

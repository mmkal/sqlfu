name: pr-package-size

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: head

      - name: Checkout main baseline
        uses: actions/checkout@v4
        with:
          ref: main
          path: base

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            head/pnpm-lock.yaml
            base/pnpm-lock.yaml

      - name: Install (PR)
        working-directory: head
        run: pnpm install --frozen-lockfile

      - name: Build (PR)
        working-directory: head
        run: pnpm --filter sqlfu build

      - name: Pack (PR)
        working-directory: head/packages/sqlfu
        run: npm pack --dry-run --json > "$GITHUB_WORKSPACE/head.json"

      - name: Install (main)
        working-directory: base
        run: pnpm install --frozen-lockfile

      - name: Build (main)
        working-directory: base
        run: pnpm --filter sqlfu build

      - name: Pack (main)
        working-directory: base/packages/sqlfu
        run: npm pack --dry-run --json > "$GITHUB_WORKSPACE/base.json"

      - name: Render markdown report
        working-directory: head
        run: pnpm exec tsx scripts/compare-package-size.ts --base "$GITHUB_WORKSPACE/base.json" --head "$GITHUB_WORKSPACE/head.json" > "$GITHUB_WORKSPACE/report.md"

      - name: Show report in job summary
        run: cat "$GITHUB_WORKSPACE/report.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Update PR body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync(`${process.env.GITHUB_WORKSPACE}/report.md`, 'utf8');
            const summaryMatch = raw.match(/<!--\s*package-size:summary:\s*(.+?)\s*-->/);
            const summary = summaryMatch ? summaryMatch[1] : 'package size';
            const report = raw.replace(/<!--\s*package-size:summary:.*?-->\s*/, '').trim();
            const start = '<!-- package-size:start -->';
            const end = '<!-- package-size:end -->';
            const section = `${start}\n<details>\n<summary>Package size — ${summary}</summary>\n\n${report}\n\n</details>\n${end}`;

            const {data: pr} = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const body = pr.body || '';
            const pattern = new RegExp(`${start}[\\s\\S]*?${end}`);
            const next = pattern.test(body)
              ? body.replace(pattern, section)
              : `${body}${body && !body.endsWith('\n') ? '\n' : ''}\n${section}\n`;

            if (next === body) return;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: next,
            });

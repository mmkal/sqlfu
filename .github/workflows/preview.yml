name: preview

on:
  push:
    branches:
      - main
      - demo
  pull_request:

permissions:
  contents: read

jobs:
  website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # artifact.ci watches this repo and serves any artifact uploaded here
      # as a previewable static site. This workflow doesn't deploy anywhere
      # itself — uploading the artifact *is* the preview hand-off. The UI
      # ships inside `website/dist/ui` via website/scripts/sync-ui.mjs, so
      # a single artifact covers the landing page, docs, and demo UI.
      - name: Upload website artifact
        uses: actions/upload-artifact@v4
        with:
          name: website
          path: website/dist

name: deploy-ui

on:
  push:
    branches:
      - main
      - demo
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sqlfu
        run: pnpm --filter sqlfu build

      - name: Build UI
        run: pnpm --filter sqlfu-ui build

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui
          path: packages/ui/dist
